<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Links</title>
    <style>
        :root {
            --cor-fundo: #f3f4f6; /* Mude o fundo aqui */
            --cor-card: #ffffff;
            --cor-texto: #111827;
            --cor-botao: #ffffff;
            --cor-borda-botao: #e5e7eb;
            --fonte-principal: 'Arial', sans-serif;
        }

        body { 
            background-color: var(--cor-fundo); 
            font-family: var(--fonte-principal);
            display: flex; justify-content: center; padding: 20px;
            /* Se quiser usar a imagem de fundo que subiu, use a linha abaixo: */
            /* background-image: url('fundo-celular.png.png'); background-size: cover; */
        }
        .container { 
            background: var(--cor-card); width: 100%; max-width: 400px;
            border-radius: 20px; padding: 40px 20px; text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .perfil img { width: 96px; height: 96px; border-radius: 50%; object-fit: cover; }
        .links { margin-top: 30px; }
        .link-card {
            display: flex; align-items: center; justify-content: center;
            background: var(--cor-botao); border: 1px solid var(--cor-borda-botao);
            padding: 15px; margin-bottom: 12px; border-radius: 8px;
            text-decoration: none; color: var(--cor-texto); font-weight: bold;
        }
        .link-card img { width: 30px; margin-right: 15px; }
        audio { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <audio id="musica" loop>
            <source src="musica.mp3.mp3" type="audio/mpeg">
        </audio>

        <div class="perfil">
            <img src="foto-perfil.png.png" alt="Foto"> <h2>@MISTAGOGO33</h2>
            <p>Canal de Mitologia</p>
        </div>

        <div class="links">
            <a href="https://www.youtube.com/@MYSTAGOGUS.33" class="link-card">
                <img src="icone-youtube.png.png"> YOUTUBE
            </a>
            <a href="https://www.instagram.com/mystagogus.oficial/" class="link-card">
                <img src="icone-instagram.png.png"> INSTAGRAM
            </a>
            <a href="https://www.tiktok.com/@mystagogus.33?_t=zm-8wc5bjly3pv&_r=1" class="link-card">
                <img src="icone-tiktok.png.png"> TIKTOK
            </a>
            <a href="https://www.facebook.com/profile.php?id=61585818361463" class="link-card">
                <img src="icone-facebook.png.png"> FACEBOOK
            </a>
            <a href="https://www.whatsapp.com/channel/0029Vb67Cr5GehEP6aKhr61j" class="link-card">
                <img src="icone-whatsapp.png.png"> WHATSAPP
            </a>
             <a href="https://t.me/MYSTAGOGUS33" class="link-card">
                <img src="icone-telegram.png.png"> TELEGRAM
        </div>
    </div>

    <script>
        document.body.addEventListener('click', () => {
            const m = document.getElementById('musica');
            m.play().catch(e => console.log("Erro ao tocar:", e));
        }, { once: true });
    </script>
</body>
</html>
