<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Links | Mystagogus33</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Arial', sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-color: #000;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
        }

        /* --- CONFIGURAÇÃO DE FUNDO DINÂMICO --- */
        @media (min-width: 769px) {
            body { background-image: url('fundo-computador.png.png') !important; }
        }
        @media (max-width: 768px) {
            body { background-image: url('fundo-celular.png.png') !important; }
        }

        /* --- CARTÃO CENTRAL (Mantido preto transparente e sombra premium) --- */
        .container { 
            background: rgba(0, 0, 0, 0.85); 
            width: 100%; 
            max-width: 400px;
            border-radius: 25px; 
            padding: 45px 25px; 
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* --- FOTO DE PERFIL CIRCULAR --- */
        .perfil-foto-container {
            width: 100px; height: 100px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .perfil-foto-container img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }

        /* --- TEXTOS (Mantidos maiúsculas e negrito pesado) --- */
        h2 { 
            margin-bottom: 5px; 
            color: #fff; 
            font-size: 1.5rem; 
            font-weight: 900; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        p { 
            color: #ccc; 
            font-size: 0.85rem; 
            margin-bottom: 30px; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* --- LISTA DE LINKS ORGANIZADA --- */
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            display: flex; 
            align-items: center; 
            justify-content: center; /* Centraliza o ícone e o texto */
            background: #fff; /* Fundo branco do botão mantido para contraste */
            border: 1px solid #e5e7eb;
            padding: 12px 18px; /* Ajuste sutil no padding */
            border-radius: 12px;
            text-decoration: none; 
            color: #111; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .link-card:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 8px 20px rgba(255,255,255,0.1);
            background: #fdfdfd;
        }
        
        /* --- NOVA ESTRUTURA PARA ÍCONES CIRCULARES --- */
        .icone-circulo {
            width: 32px; height: 32px; /* Moldura do ícone circular */
            display: flex; 
            align-items: center; 
            justify-content: center;
            margin-right: 15px; /* Espaço entre o ícone e o texto */
            flex-shrink: 0; /* Impede que ele amasse */
            border-radius: 50%; /* Torna a moldura circular */
            border: 2px solid #111; /* Borda preta no ícone para combinar com o botão branco */
            overflow: hidden; /* Corta o excesso */
            background-color: #f3f3f3; /* Fundo leve para o ícone */
        }
        
        .icone-circulo img {
            width: 75%; height: 75%; /* Ícone menor dentro do círculo para respirar */
            object-fit: contain; /* Ajusta sem distorcer */
            display: block;
        }
        
        audio { display: none; }
    </style>
</head>
<body>

    <audio id="musica" loop>
        <source src="musica.mp3.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="perfil">
            <div class="perfil-foto-container">
                <img src="foto-perfil.png.png" alt="Foto"> 
            </div>
            <h2>MYSTAGOGUS.33</h2>
            <p>CANAL DE MITOLOGIA</p>
        </div>

        <div class="links">
            <a href="https://www.youtube.com/@MYSTAGOGUS.33" target="_blank" class="link-card">
                <span class="icone-circulo"><img src="icone-youtube.png.png"></span> YOUTUBE
            </a>
            <a href="https://www.instagram.com/mystagogus.oficial/" target="_blank" class="link-card">
                <span class="icone-circulo"><img src="icone-instagram.png.png"></span> INSTAGRAM
            </a>
            <a href="https://www.tiktok.com/@mystagogus.33?_t=zm-8wc5bjly3pv&_r=1" target="_blank" class="link-card">
                <span class="icone-circulo"><img src="icone-tiktok.png.png"></span> TIKTOK
            </a>
            <a href="https://www.facebook.com/profile.php?id=61585818361463" target="_blank" class="link-card">
                <span class="icone-circulo"><img src="icone-facebook.png.png"></span> FACEBOOK
            </a>
            <a href="https://www.whatsapp.com/channel/0029Vb67Cr5GehEP6aKhr61j" target="_blank" class="link-card">
                <span class="icone-circulo"><img src="icone-whatsapp.png.png"></span> WHATSAPP
            </a>
            <a href="https://t.me/MYSTAGOGUS33" target="_blank" class="link-card">
                <span class="icone-circulo"><img src="icone-telegram.png.png"></span> TELEGRAM
            </a>
        </div>
    </div>

    <script>
        document.body.addEventListener('click', () => {
            document.getElementById('musica').play();
        }, { once: true });
    </script>
</body>
</html>
